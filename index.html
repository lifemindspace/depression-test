<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>抑郁症状自评量表 / Depression Self-Assessment (PHQ-9)</title>
<meta name="description" content="基于国际通用 PHQ-9 患者健康问卷改编的抑郁症状自我评估工具，中英双语，非诊断用途，单文件离线可用。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#0b1830;
    --navy-900:#0f1f3d;
    --bg-0:#ffffff;
    --bg-1:#eef2f9;
    --bg-2:#dde6f5;
    --mist:#eef3fb;
    --mist-strong:#dbe6f7;
    --line:#c9d6ee;
    --line-soft:#e0e9f7;
    --navy-100:#e4ecfa;
    --navy-300:#9ab0dd;
    --navy-500:#5578c2;
    --navy-600:#2f4f9e;
    --navy-700:#16305f;
    --ink-900:#0f1f3d;
    --ink-700:#2c3e5c;
    --ink-500:#5c6b85;
    --ink-300:#93a1bd;
    --amber-soft:#f0dcae;
    --amber-ink:#8a6a2e;
    --rust-soft:#ecceb8;
    --rust-ink:#9a4f2c;
    --shadow-card: 0 1px 2px rgba(15,31,61,.06), 0 18px 40px -18px rgba(22,48,95,.28);
    --shadow-btn: 0 8px 20px -8px rgba(22,48,95,.4);
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --serif: "Noto Serif SC", "Songti SC", serif;
    --sans: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    color:#eef2f9;
    background:
      radial-gradient(circle at 15% -10%, rgba(85,120,194,.28) 0%, transparent 55%),
      radial-gradient(circle at 100% 0%, rgba(47,79,158,.22) 0%, transparent 45%),
      #0f1f3d;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    line-height:1.65;
  }
  ::selection{background:#9ab0dd;color:#0f1f3d;}
  a{color:#9ab0dd;}

  .app{ max-width:640px; margin:0 auto; padding:28px 20px 60px; position:relative; z-index:1; }

  /* ---------- Ambient warm glow signature (replaces cool "wave") ---------- */
  .wave-field{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .wave-field svg{position:absolute; left:0; bottom:-4vh; width:220%; height:32vh; opacity:.5;}
  .wave-a{animation: drift 28s linear infinite;}
  .wave-b{animation: drift 42s linear infinite reverse; opacity:.32;}
  @keyframes drift{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  @media (prefers-reduced-motion: reduce){ .wave-a, .wave-b{animation:none;} }

  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; font-size:13px; color:rgba(255,255,255,.65); }
  .lang-switch{
    display:inline-flex; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.22); border-radius:99px;
    padding:3px; gap:2px; font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px;
  }
  .lang-switch button{
    appearance:none; border:none; background:transparent; cursor:pointer; padding:5px 12px;
    border-radius:99px; color:rgba(255,255,255,.7); font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px; font-weight:600;
    transition:background .15s ease, color .15s ease;
  }
  .lang-switch button.active{ background:#ffffff; color:#16305f; }
  .badge-time{
    font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px; color:rgba(255,255,255,.75);
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.22); padding:4px 11px; border-radius:99px;
  }

  .card{
    background:#ffffff; border:1px solid #e0e9f7; border-radius:22px;
    box-shadow:0 1px 2px rgba(15,31,61,.06), 0 18px 40px -18px rgba(22,48,95,.28); padding:34px 30px; position:relative; overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg, #9ab0dd, #2f4f9e, #9ab0dd); opacity:.75;
  }

  .screen{ display:none; animation: rise .5s ease both; }
  .screen.active{ display:block; }
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){ .screen{animation:none;} }

  .eyebrow{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#16305f; margin:0 0 10px; }
  h1.title{ font-family:"Noto Serif SC", "Songti SC", serif; font-weight:700; font-size:27px; line-height:1.35; color:#0f1f3d; margin:0 0 14px; }
  .lede{ color:#2c3e5c; font-size:15px; margin:0 0 22px; }

  .info-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:22px 0 26px; }
  .info-cell{ background:#eef3fb; border:1px solid #e0e9f7; border-radius:10px; padding:16px 10px; text-align:center; }
  .info-cell .ico{ display:block; font-size:20px; margin-bottom:4px; }
  .info-cell .num{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:19px; font-weight:600; color:#16305f; display:block; }
  .info-cell .cap{ font-size:12px; color:#5c6b85; margin-top:4px; }

  .notice-list{ margin:0 0 26px; padding:0; list-style:none; display:flex; flex-direction:column; gap:11px; }
  .notice-list li{ display:flex; gap:11px; font-size:13.5px; color:#2c3e5c; align-items:flex-start; }
  .notice-list li b{ color:#16305f; }
  .notice-list li .ic{
    flex:0 0 auto; width:24px; height:24px; border-radius:50%; background:#e4ecfa;
    display:flex; align-items:center; justify-content:center; font-size:13px; margin-top:0; line-height:1;
  }

  .btn{
    appearance:none; border:none; cursor:pointer; font-family:"Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size:15px; font-weight:600; border-radius:99px; padding:14px 26px;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    transition:transform .15s ease, box-shadow .15s ease, background .2s ease;
  }
  .btn:active{ transform:scale(.97); }
  .btn:focus-visible{ outline:3px solid #9ab0dd; outline-offset:2px; }
  .btn-primary{ background:linear-gradient(135deg, #2f4f9e, #16305f); color:#fff; box-shadow:0 8px 20px -8px rgba(22,48,95,.4); width:100%; }
  .btn-primary:hover{ filter:brightness(1.04); }
  .btn-ghost{ background:#ffffff; color:#16305f; border:1px solid #c9d6ee; }
  .btn-ghost:hover{ background:#eef3fb; }
  .btn-soft{ background:#eef3fb; color:#2c3e5c; border:1px solid #e0e9f7; }
  .btn-soft:hover{ background:#dbe6f7; }
  .btn[disabled]{ opacity:.4; cursor:not-allowed; }
  .btn-row{ display:flex; gap:10px; margin-top:6px; }
  .btn-row .btn{ flex:1; }

  .progress-wrap{ margin-bottom:26px; }
  .progress-meta{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .progress-meta .section-label{ font-size:12.5px; color:#16305f; font-weight:600; letter-spacing:.02em; }
  .progress-meta .count{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12.5px; color:#5c6b85; }
  .tide{ position:relative; height:7px; border-radius:99px; background:#dbe6f7; overflow:hidden; }
  .tide-fill{ position:absolute; inset:0; width:0%; border-radius:99px; background:linear-gradient(90deg, #5578c2, #16305f); transition:width .4s cubic-bezier(.4,0,.2,1); }

  .q-cluster-tag{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:11px; color:#93a1bd; letter-spacing:.06em; text-transform:uppercase; margin-bottom:8px; }
  .q-text{ font-family:"Noto Serif SC", "Songti SC", serif; font-size:19px; line-height:1.6; color:#0f1f3d; font-weight:600; margin:0 0 26px; min-height:64px; }

  .likert{ margin-bottom:28px; }
  .likert-row{ display:flex; justify-content:space-between; gap:6px; margin-bottom:8px; }
  .likert-opt{
    flex:1; aspect-ratio:1/1; border-radius:50%; border:1.5px solid #c9d6ee;
    background:#ffffff; cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-family:"JetBrains Mono", ui-monospace, monospace; font-weight:700; font-size:15px; color:#2c3e5c;
    transition:all .15s ease; max-width:56px; margin:0 auto; width:100%;
  }
  .likert-opt:hover{ border-color:#5578c2; background:#e4ecfa; }
  .likert-opt.selected{ background:#16305f; border-color:#16305f; color:#fff; transform:scale(1.08); }
  .likert-anchors{ display:flex; justify-content:space-between; font-size:11.5px; color:#5c6b85; padding:0 2px; }
  .likert-anchors span:last-child{ text-align:right; }
  .likert-current{ text-align:center; margin-top:14px; font-size:13px; color:#16305f; font-weight:600; min-height:18px; }

  /* wide option list for the 4-choice impairment question */
  .opt-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
  .opt{
    position:relative; display:flex; align-items:center; gap:12px;
    border:1.5px solid #c9d6ee; border-radius:14px; padding:13px 16px; cursor:pointer;
    background:#ffffff; transition:border-color .15s ease, background .15s ease;
  }
  .opt:hover{ border-color:#5578c2; background:#e4ecfa; }
  .opt.selected{ border-color:#16305f; background:#e4ecfa; }
  .opt .radio{ width:19px; height:19px; border-radius:50%; border:2px solid #c9d6ee; flex:0 0 auto; display:flex; align-items:center; justify-content:center; }
  .opt .radio::after{ content:""; width:9px; height:9px; border-radius:50%; background:#16305f; transform:scale(0); transition:transform .15s ease; }
  .opt.selected .radio{ border-color:#16305f; }
  .opt.selected .radio::after{ transform:scale(1); }
  .opt .opt-label{ font-size:14.5px; color:#0f1f3d; font-weight:500; }

  #result-capture{ padding:2px; }
  .result-hero{ display:flex; align-items:center; gap:22px; margin-bottom:24px; flex-wrap:wrap; }
  .ring-wrap{ position:relative; width:118px; height:118px; flex:0 0 auto; }
  .ring-wrap svg{ width:100%; height:100%; transform:rotate(-90deg); }
  .ring-track{ fill:none; stroke:#dbe6f7; stroke-width:10; }
  .ring-fill{ fill:none; stroke:#2f4f9e; stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1); }
  .ring-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring-center .score-num{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:26px; font-weight:600; color:#0f1f3d; }
  .ring-center .score-den{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:11px; color:#5c6b85; }

  .result-headline{ flex:1 1 200px; min-width:180px; }
  .result-tag{ display:inline-block; font-size:12px; font-weight:600; padding:4px 12px; border-radius:99px; margin-bottom:8px; letter-spacing:.02em; }
  .tag-low{ background:#e4ecfa; color:#16305f; }
  .tag-mid{ background:#f0dcae; color:#8a6a2e; }
  .tag-high{ background:#ecceb8; color:#9a4f2c; }
  .result-headline h2{ font-family:"Noto Serif SC", "Songti SC", serif; font-size:21px; margin:0 0 6px; color:#0f1f3d; line-height:1.4; }
  .result-headline p{ margin:0; font-size:13.5px; color:#5c6b85; }

  .section-title{ font-family:"Noto Serif SC", "Songti SC", serif; font-size:15px; font-weight:700; color:#16305f; margin:28px 0 14px; display:flex; align-items:center; gap:8px; }
  .section-title::after{ content:""; flex:1; height:1px; background:#e0e9f7; }

  .chart-shell{ background:#eef3fb; border:1px solid #e0e9f7; border-radius:14px; padding:16px; margin-bottom:10px; }
  .chart-shell canvas{ max-width:100%; }

  .impairment-card{
    background:#eef3fb; border:1px solid #e0e9f7; border-radius:14px;
    padding:16px 18px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:12px;
  }
  .impairment-card .lbl{ font-size:13.5px; color:#2c3e5c; }
  .impairment-card .val{ font-size:13px; font-weight:700; color:#16305f; background:#e4ecfa; padding:4px 12px; border-radius:99px; white-space:nowrap; }

  .rec-list{ margin:0; padding-left:0; list-style:none; display:flex; flex-direction:column; gap:12px; }
  .rec-list li{
    display:flex; gap:12px; font-size:13.5px; color:#2c3e5c; align-items:flex-start;
    background:#ffffff; border:1px solid #e0e9f7; border-radius:14px; padding:13px 15px;
  }
  .rec-list li b{ color:#0f1f3d; }
  .rec-list li .num{
    font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px; color:#16305f; font-weight:700; flex:0 0 auto;
    width:22px; height:22px; border-radius:50%; background:#e4ecfa; display:flex; align-items:center; justify-content:center;
  }

  .disclaimer{ font-size:12px; color:#5c6b85; background:#eef2f9; border:1px dashed #c9d6ee; border-radius:14px; padding:14px 16px; margin-top:24px; line-height:1.7; }
  .disclaimer b{ color:#2c3e5c; }

  .crisis-note{
    font-size:12.5px; color:#9a4f2c; background:#ecceb8; border:1px solid #dcae8f;
    border-radius:14px; padding:14px 16px; margin-top:14px; line-height:1.75;
  }
  .crisis-note b{ display:block; margin-bottom:4px; font-size:13px; }

  .action-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:26px; }
  .action-grid .btn{ width:100%; font-size:14px; padding:13px 14px; }

  .toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(10px);
    background:#0f1f3d; color:#fff; font-size:13px; padding:10px 18px; border-radius:99px;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:50;
    box-shadow:0 10px 30px -10px rgba(0,0,0,.4);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  footer.foot{ text-align:center; margin-top:30px; font-size:11.5px; color:rgba(255,255,255,.45); }

  @media (max-width:420px){
    .card{ padding:26px 18px; }
    h1.title{ font-size:24px; }
    .action-grid{ grid-template-columns:1fr 1fr; }
    .likert-opt{ max-width:44px; font-size:13px; }
  }

  /* ---------- QR / share modal (shared pattern) ---------- */
  .qr-overlay{
    position:fixed; inset:0; z-index:80; display:none;
    align-items:center; justify-content:center;
    background:rgba(15,31,61,.5); backdrop-filter:blur(2px);
    padding:20px;
  }
  .qr-overlay.show{ display:flex; }
  .qr-modal{
    position:relative; background:#fff; border-radius:22px;
    padding:30px 26px 26px; max-width:320px; width:100%; text-align:center;
    box-shadow:0 30px 60px -20px rgba(15,31,61,.4);
    animation: qr-pop .25s cubic-bezier(.2,.9,.3,1.2) both;
  }
  @keyframes qr-pop{ from{opacity:0; transform:scale(.92) translateY(6px);} to{opacity:1; transform:scale(1) translateY(0);} }
  .qr-close{ position:absolute; top:10px; right:12px; border:none; background:none; cursor:pointer; font-size:22px; line-height:1; color:#93a1bd; padding:6px; }
  .qr-close:hover{ color:#2c3e5c; }
  .qr-eyebrow{ font-family:"Noto Serif SC", "Songti SC", serif; font-weight:700; font-size:16px; color:#0f1f3d; margin:0 0 16px; }
  .qr-img{ width:100%; max-width:220px; height:auto; border-radius:12px; border:1px solid #e0e9f7; margin-bottom:14px; }
  .qr-placeholder{
    width:220px; height:220px; max-width:100%; margin:0 auto 14px; border-radius:12px;
    border:1.5px dashed #c9d6ee; background:#eef3fb; display:flex; align-items:center; justify-content:center;
    font-size:12.5px; color:#5c6b85; padding:16px; text-align:center; line-height:1.6;
  }
  .qr-hint{ font-size:12.5px; color:#5c6b85; margin:0 0 12px; line-height:1.7; }
  .qr-fallback{ display:inline-block; font-size:12.5px; color:#16305f; text-decoration:underline; }
  .qr-academic-note{ margin:14px 0 0; padding-top:12px; border-top:1px dashed #c9d6ee; font-size:11.5px; color:#93a1bd; line-height:1.7; }
  .share-url-input{
    width:100%; padding:11px 12px; border:1.5px solid #c9d6ee; border-radius:10px;
    font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px; color:#0f1f3d;
    margin-bottom:12px; background:#eef2f9;
  }
</style>
</head>
<body>

<div class="wave-field" aria-hidden="true">
  <svg class="wave-a" viewBox="0 0 1600 200" preserveAspectRatio="none">
    <path d="M0,120 C200,60 400,180 600,110 C800,40 1000,160 1200,100 C1400,40 1500,120 1600,90 L1600,200 L0,200 Z" fill="#3a5ba8" opacity="0.5"/>
  </svg>
  <svg class="wave-b" viewBox="0 0 1600 200" preserveAspectRatio="none">
    <path d="M0,140 C220,90 420,190 640,130 C860,70 1040,170 1260,120 C1420,80 1520,140 1600,110 L1600,200 L0,200 Z" fill="#6d90d6" opacity="0.4"/>
  </svg>
</div>

<div class="app">

  <div class="topbar">
    <div class="lang-switch" id="lang-switch">
      <button data-lang="zh" id="lang-btn-zh">中文</button>
      <button data-lang="en" id="lang-btn-en">EN</button>
    </div>
    <div class="badge-time" id="topbar-progress"></div>
  </div>

  <!-- ============ SCREEN 1: INTRO ============ -->
  <section class="screen active card" id="screen-intro">
    <p class="eyebrow" data-i18n="eyebrow_intro"></p>
    <h1 class="title" data-i18n-html="title_intro"></h1>
    <p class="lede" data-i18n="lede_intro"></p>

    <div class="info-grid">
      <div class="info-cell"><span class="ico">📋</span><span class="num">10</span><span class="cap" data-i18n="info_items"></span></div>
      <div class="info-cell"><span class="ico">⏱️</span><span class="num">2</span><span class="cap" data-i18n="info_weeks"></span></div>
    </div>

    <ul class="notice-list">
      <li><span class="ic">🔒</span><span data-i18n-html="notice_3"></span></li>
      <li><span class="ic">📝</span><span data-i18n-html="notice_2"></span></li>
      <li><span class="ic">✅</span><span data-i18n-html="notice_1"></span></li>
    </ul>

    <button class="btn btn-primary" id="btn-start" data-i18n="btn_start"></button>
  </section>

  <!-- ============ SCREEN 2: QUIZ ============ -->
  <section class="screen card" id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="section-label" id="section-label"></span>
        <span class="count" id="q-counter"></span>
      </div>
      <div class="tide"><div class="tide-fill" id="tide-fill"></div></div>
    </div>

    <p class="q-cluster-tag" id="q-cluster-tag"></p>
    <p class="q-text" id="q-text"></p>

    <!-- standard 0-3 frequency scale (items 1-9) -->
    <div class="likert" id="likert-block">
      <div class="likert-row" id="likert-row"></div>
      <div class="likert-anchors">
        <span id="anchor-low"></span>
        <span id="anchor-high"></span>
      </div>
      <div class="likert-current" id="likert-current"></div>
    </div>

    <!-- 4-choice impairment scale (item 10 only) -->
    <div class="opt-list" id="opt-list" style="display:none;"></div>

    <div class="btn-row">
      <button class="btn btn-soft" id="btn-prev"></button>
      <button class="btn btn-primary" id="btn-next" disabled></button>
    </div>
  </section>

  <!-- ============ SCREEN 3: RESULT ============ -->
  <section class="screen card" id="screen-result">
    <div id="result-capture">
      <p class="eyebrow" data-i18n="eyebrow_result"></p>

      <div class="result-hero">
        <div class="ring-wrap">
          <svg viewBox="0 0 120 120">
            <circle class="ring-track" cx="60" cy="60" r="50"></circle>
            <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="50" stroke-dasharray="314" stroke-dashoffset="314"></circle>
          </svg>
          <div class="ring-center">
            <span class="score-num" id="score-num">0</span>
            <span class="score-den">/ 27</span>
          </div>
        </div>
        <div class="result-headline">
          <span class="result-tag tag-low" id="result-tag"></span>
          <h2 id="result-title"></h2>
          <p id="result-sub"></p>
        </div>
      </div>

      <p style="font-size:13.5px;color:#2c3e5c;margin:0 0 4px;" id="result-desc"></p>

      <div class="section-title" data-i18n="section_chart"></div>
      <div class="chart-shell">
        <canvas id="items-chart" height="280"></canvas>
      </div>

      <div class="section-title" data-i18n="section_impairment"></div>
      <div class="impairment-card">
        <span class="lbl" data-i18n="impairment_label"></span>
        <span class="val" id="impairment-val"></span>
      </div>

      <div class="section-title" data-i18n="section_rec"></div>

  var state = { answers:{}, idx:0, resultComputed:false };

  var elIntro = document.getElementById('screen-intro');
  var elQuiz  = document.getElementById('screen-quiz');
  var elResult= document.getElementById('screen-result');

  function showScreen(el){
    [elIntro, elQuiz, elResult].forEach(function(s){ s.classList.remove('active'); });
    el.classList.add('active');
    window.scrollTo({top:0, behavior:'smooth'});
  }

  var likertBlockEl = document.getElementById('likert-block');
  var likertRowEl = document.getElementById('likert-row');
  var likertCurrentEl = document.getElementById('likert-current');
  var optListEl = document.getElementById('opt-list');
  var qTextEl = document.getElementById('q-text');
  var qClusterTagEl = document.getElementById('q-cluster-tag');
  var sectionLabelEl = document.getElementById('section-label');
  var counterEl = document.getElementById('q-counter');
  var tideFillEl = document.getElementById('tide-fill');
  var btnPrev = document.getElementById('btn-prev');
  var btnNext = document.getElementById('btn-next');

  function renderQuestion(){
    var q = QUESTIONS[state.idx];
    sectionLabelEl.textContent = q.sectionLabel[LANG];
    qClusterTagEl.textContent = q.tag[LANG];
    qTextEl.textContent = q.text[LANG];
    counterEl.textContent = (state.idx+1) + " / " + QUESTIONS.length;
    tideFillEl.style.width = ((state.idx / QUESTIONS.length) * 100) + "%";
    document.getElementById('topbar-progress').textContent = (state.idx+1) + " / " + QUESTIONS.length;

    if(q.type === 'freq'){
      likertBlockEl.style.display = 'block';
      optListEl.style.display = 'none';
      likertRowEl.innerHTML = "";
      for(var v=0; v<=3; v++){
        (function(v){
          var btn = document.createElement('button');
          btn.type = "button";
          btn.className = "likert-opt";
          btn.textContent = v;
          if(state.answers[q.id] === v) btn.classList.add('selected');
          btn.addEventListener('click', function(){
            state.answers[q.id] = v;
            renderQuestion();
            setTimeout(function(){ goNextAuto(); }, 220);
          });
          likertRowEl.appendChild(btn);
        })(v);
      }
      likertCurrentEl.textContent = (state.answers[q.id] !== undefined) ? t('likert_'+state.answers[q.id]) : "";
    } else {
      likertBlockEl.style.display = 'none';
      optListEl.style.display = 'flex';
      optListEl.innerHTML = "";
      for(var iv=0; iv<=3; iv++){
        (function(iv){
          var wrap = document.createElement('label');
          wrap.className = 'opt';
          if(state.answers[q.id] === iv) wrap.classList.add('selected');
          wrap.innerHTML = '<span class="radio"></span><span class="opt-label">'+t('imp_'+iv)+'</span>';
          wrap.addEventListener('click', function(){
            state.answers[q.id] = iv;
            renderQuestion();
            setTimeout(function(){ goNextAuto(); }, 220);
          });
          optListEl.appendChild(wrap);
        })(iv);
      }
    }

    btnPrev.disabled = (state.idx === 0);
    btnNext.disabled = (state.answers[q.id] === undefined);
    btnNext.textContent = (state.idx === QUESTIONS.length - 1) ? t('btn_next_last') : t('btn_next');
  }

  function goNextAuto(){
    if(state.answers[QUESTIONS[state.idx].id] === undefined) return;
    if(state.idx < QUESTIONS.length - 1){
      state.idx++;
      renderQuestion();
    } else {
      computeAndShowResult();
    }
  }

  btnNext.addEventListener('click', function(){
    if(state.answers[QUESTIONS[state.idx].id] === undefined) return;
    if(state.idx < QUESTIONS.length - 1){
      state.idx++;
      renderQuestion();
    } else {
      computeAndShowResult();
    }
  });
  btnPrev.addEventListener('click', function(){
    if(state.idx > 0){ state.idx--; renderQuestion(); }
  });

  document.getElementById('btn-start').addEventListener('click', function(){
    state.idx = 0;
    renderQuestion();
    showScreen(elQuiz);
  });

  function score(id){ return state.answers[id] === undefined ? 0 : state.answers[id]; }

  var chartInstance = null;

  function computeAndShowResult(){
    var itemIds = ['Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8','Q9'];
    var total = 0;
    itemIds.forEach(function(id){ total += score(id); });

    var sev = SEVERITY.find(function(s){ return total <= s.max; }) || SEVERITY[SEVERITY.length-1];
    var copy = SEVERITY_COPY[sev.key];

    var circumference = 2*Math.PI*50;
    var pct = Math.min(1, total/27);
    var ringFill = document.getElementById('ring-fill');
    ringFill.setAttribute('stroke-dasharray', circumference.toFixed(1));
    requestAnimationFrame(function(){
      ringFill.style.strokeDashoffset = (circumference*(1-pct)).toFixed(1);
    });
    document.getElementById('score-num').textContent = total;

    var tagEl = document.getElementById('result-tag');
    tagEl.className = 'result-tag ' + sev.tagClass;
    tagEl.textContent = copy.tag[LANG];
    document.getElementById('result-title').textContent = copy.title[LANG];
    document.getElementById('result-sub').textContent = "";
    document.getElementById('result-desc').textContent = copy.desc[LANG];

    var impVal = score('Q10');
    document.getElementById('impairment-val').textContent = t('imp_'+impVal);

    renderItemsChart(itemIds);
    renderRecommendations(sev.key);

    var crisisEl = document.getElementById('crisis-note');
    if(score('Q9') > 0){
      crisisEl.style.display = 'block';
    } else {
      crisisEl.style.display = 'none';
    }

    document.getElementById('topbar-progress').textContent = t('progress_of');
    state.resultComputed = true;
    showScreen(elResult);
  }

  function renderItemsChart(itemIds){
    var shortLabels = {
      zh: ["兴趣/乐趣","情绪低落","睡眠","精力","食欲","自我评价","专注力","精神运动","自伤念头"],
      en: ["Interest","Mood","Sleep","Energy","Appetite","Self-worth","Focus","Psychomotor","Self-harm"]
    };
    var values = itemIds.map(function(id){ return score(id); });
    var canvas = document.getElementById('items-chart');
    if(typeof Chart === 'undefined'){ return; }
    if(chartInstance){ chartInstance.destroy(); }
    chartInstance = new Chart(canvas, {
      type:'bar',
      data:{
        labels: shortLabels[LANG],
        datasets:[{
          data: values,
          backgroundColor: values.map(function(v){
            return v<=1 ? 'rgba(85,120,194,0.35)' : v===2 ? 'rgba(85,120,194,0.65)' : 'rgba(22,48,95,0.9)';
          }),
          borderRadius:6,
          maxBarThickness:28
        }]
      },
      options:{
        indexAxis:'y',
        responsive:true,
        animation:{duration:700},
        plugins:{legend:{display:false}},
        scales:{
          x:{ min:0, max:3, ticks:{stepSize:1, color:'#5c6b85', font:{size:11}}, grid:{color:'#e0e9f7'} },
          y:{ ticks:{color:'#2c3e5c', font:{size:12, family:'"Noto Sans SC","PingFang SC",sans-serif'}}, grid:{display:false} }
        }
      }
    });
  }

         en:"<b>Treatment usually combines medication and psychotherapy:</b> self-help alone tends to have limited effect at this score range; professional medication (if indicated) combined with therapy (CBT/IPT) is generally more effective than either alone."},
        {zh:"<b>找一位「安全联系人」：</b>告诉一位信任的家人或朋友你目前的状态，并约定：如果连续2天感觉明显变差，会主动联系对方或直接联系医生，而不是自己扛。",
         en:"<b>Identify a “safety contact”:</b> tell one trusted family member or friend how you're doing right now, and agree that if things clearly worsen for 2 days in a row, you'll reach out to them or your doctor directly, rather than trying to manage it alone."}
      ];
    } else {
      recs = [
        {zh:"<b>建议尽快（最好本周内）联系精神科医生：</b>重度区间通常需要专业干预，包括药物治疗的评估；请把这次测评结果带给医生作为参考。",
         en:"<b>Contact a psychiatrist as soon as possible (ideally this week):</b> the severe range typically calls for professional intervention, including an evaluation for medication. Bring this result to your appointment as a reference."},
        {zh:"<b>找一位「安全联系人」，今天就联系：</b>告诉一位信任的人你现在的状态，不需要说很多，哪怕只是「我最近很不好，需要有人知道」。",
         en:"<b>Identify a “safety contact” and reach out today:</b> tell someone you trust how you're doing right now — it doesn't need to be much, even just “I'm not doing well and needed someone to know.”"},
        {zh:"<b>把「联系医生」这件事拆到最小的第一步：</b>如果现在联系医生感觉太难，第一步可以只是「找到一个电话号码」或「让家人帮忙打这通电话」，不需要一次做完所有事。",
         en:"<b>Break “contact a doctor” into the smallest possible first step:</b> if reaching out feels like too much right now, the first step can just be “find a phone number” or “ask a family member to make the call for me” — you don't have to do it all at once."}
      ];
    }

    recList.innerHTML = '';
    recs.forEach(function(item, i){
      var li = document.createElement('li');
      li.innerHTML = '<span class="num">'+(i+1)+'</span><span>'+item[LANG]+'</span>';
      recList.appendChild(li);
    });

    if(helpOthers.length){
      helpTitle.style.display = 'flex';
      helpList.style.display = 'flex';
      helpList.innerHTML = '';
      helpOthers.forEach(function(item, i){
        var li = document.createElement('li');
        li.innerHTML = '<span class="num">'+(i+1)+'</span><span>'+item[LANG]+'</span>';
        helpList.appendChild(li);
      });
    } else {
      helpTitle.style.display = 'none';
      helpList.style.display = 'none';
    }
  }

  function showToast(msg){
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 2200);
  }

  document.getElementById('btn-retake').addEventListener('click', function(){
    state.answers = {};
    state.idx = 0;
    state.resultComputed = false;
    renderQuestion();
    showScreen(elIntro);
  });

  /* ============================================================
     极简 PDF 生成器：把一张 JPEG 图片包成单页 PDF。
     不依赖任何第三方 PDF 库。
  ============================================================ */
  function dataUrlToUint8Array(dataUrl){
    var base64 = dataUrl.split(',')[1];
    var binary = atob(base64);
    var bytes = new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++){ bytes[i] = binary.charCodeAt(i); }
    return bytes;
  }

  function buildSingleImagePdf(jpegBytes, pxWidth, pxHeight){
    var dpi = 96;
    var ptWidth = pxWidth * 72 / dpi;
    var ptHeight = pxHeight * 72 / dpi;

    var enc = new TextEncoder();
    var chunks = [];
    var totalLen = 0;
    var offsets = [];

    function pushText(str){ var b = enc.encode(str); chunks.push(b); totalLen += b.length; }
    function pushBytes(b){ chunks.push(b); totalLen += b.length; }
    function markOffset(){ offsets.push(totalLen); }

    pushText("%PDF-1.4\n");

    markOffset();
    pushText("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n");

    markOffset();
    pushText("2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n");

    markOffset();
    pushText("3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 " + ptWidth.toFixed(2) + " " + ptHeight.toFixed(2) + "] /Resources << /XObject << /Im0 5 0 R >> >> /Contents 4 0 R >>\nendobj\n");

    var contentStr = "q " + ptWidth.toFixed(2) + " 0 0 " + ptHeight.toFixed(2) + " 0 0 cm /Im0 Do Q";
    markOffset();
    pushText("4 0 obj\n<< /Length " + contentStr.length + " >>\nstream\n" + contentStr + "\nendstream\nendobj\n");

    markOffset();
    pushText("5 0 obj\n<< /Type /XObject /Subtype /Image /Width " + pxWidth + " /Height " + pxHeight + " /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length " + jpegBytes.length + " >>\nstream\n");
    pushBytes(jpegBytes);
    pushText("\nendstream\nendobj\n");

    var xrefOffset = totalLen;
    var entries = ["0000000000 65535 f "];
    offsets.forEach(function(off){
      entries.push(String(off).padStart(10,'0') + " 00000 n ");
    });
    pushText("xref\n0 " + (offsets.length+1) + "\n" + entries.join("\n") + "\n");
    pushText("trailer\n<< /Size " + (offsets.length+1) + " /Root 1 0 R >>\nstartxref\n" + xrefOffset + "\n%%EOF");

    var out = new Uint8Array(totalLen);
    var pos = 0;
    chunks.forEach(function(c){ out.set(c, pos); pos += c.length; });
    return out;
  }

  document.getElementById('btn-save').addEventListener('click', function(){
    var target = document.getElementById('result-capture');
    var btn = document.getElementById('btn-save');
    var original = btn.textContent;
    if(typeof html2canvas === 'undefined'){
      showToast(t('toast_save_fail'));
      return;
    }
    btn.textContent = t('saving');
    btn.disabled = true;
    html2canvas(target, {backgroundColor:'#ffffff', scale: Math.min(2, window.devicePixelRatio || 2), useCORS:true, allowTaint:true})
      .then(function(canvas){
        var jpegDataUrl = canvas.toDataURL('image/jpeg', 0.92);
        var jpegBytes = dataUrlToUint8Array(jpegDataUrl);
        var pdfBytes = buildSingleImagePdf(jpegBytes, canvas.width, canvas.height);
        var blob = new Blob([pdfBytes], {type:'application/pdf'});
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.download = (LANG==='zh' ? '抑郁症状自评结果.pdf' : 'Depression-assessment-result.pdf');
        link.href = url;
        link.click();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
        btn.textContent = original;
        btn.disabled = false;
      })
      .catch(function(err){
        console.error('save-as-PDF error:', err);
        showToast(t('toast_save_fail'));
        btn.textContent = original;
        btn.disabled = false;
      });
  });

  /* ---------- 分享测评链接：多层回退 ---------- */
  var shareOverlay = document.getElementById('share-overlay');
  var shareUrlInput = document.getElementById('share-url-input');

  function execCommandCopy(text){
    try{
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      var ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    }catch(e){ return false; }
  }

  function openShareModal(url){
    shareUrlInput.value = url;
    shareOverlay.classList.add('show');
    setTimeout(function(){ shareUrlInput.focus(); shareUrlInput.select(); }, 50);
  }
  function closeShareModal(){ shareOverlay.classList.remove('show'); }

  document.getElementById('btn-share').addEventListener('click', function(){
    var url = window.location.href;
    var text = LANG==='zh'
      ? '我刚做了一份基于国际通用 PHQ-9 量表的抑郁症状自我评估，你也可以来了解一下自己的状态：'
      : "I just took a depression self-assessment based on the internationally used PHQ-9 scale — you can check your own state too:";

    if(navigator.share){
      navigator.share({title: LANG==='zh' ? '抑郁症状自我评估' : 'Depression Self-Assessment', text:text, url:url})
        .catch(function(){ /* user cancelled — not an error */ });
      return;
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text + ' ' + url).then(function(){
        showToast(t('toast_copied'));
      }).catch(function(){
        if(execCommandCopy(text + ' ' + url)){ showToast(t('toast_copied')); }
        else { openShareModal(url); }
      });
      return;
    }
    if(execCommandCopy(text + ' ' + url)){
      showToast(t('toast_copied'));
    } else {
      openShareModal(url);
    }
  });

  document.getElementById('share-close').addEventListener('click', closeShareModal);
  shareOverlay.addEventListener('click', function(e){ if(e.target === shareOverlay) closeShareModal(); });
  document.getElementById('share-copy-btn').addEventListener('click', function(){
    shareUrlInput.select();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(shareUrlInput.value).then(function(){ showToast(t('toast_copied')); }).catch(function(){
        if(execCommandCopy(shareUrlInput.value)) showToast(t('toast_copied'));
      });
    } else if(execCommandCopy(shareUrlInput.value)){
      showToast(t('toast_copied'));
    }
  });

  /* ---------- 返回公众号：微信内直接跳转，否则弹出二维码扫码 ---------- */
  var qrOverlay = document.getElementById('qr-overlay');
  var qrImg = document.getElementById('qr-img');
  var qrPlaceholder = document.getElementById('qr-placeholder');

  if(QR_DATA_URI && QR_DATA_URI.indexOf('data:image') === 0){
    qrImg.src = QR_DATA_URI;
    qrImg.style.display = 'block';
    qrPlaceholder.style.display = 'none';
  } else {
    qrImg.style.display = 'none';
    qrPlaceholder.style.display = 'flex';
  }

  function openQrModal(){
    qrOverlay.classList.add('show');
    document.addEventListener('keydown', onQrKeydown);
  }
  function closeQrModal(){
    qrOverlay.classList.remove('show');
    document.removeEventListener('keydown', onQrKeydown);
  }
  function onQrKeydown(e){ if(e.key === 'Escape') closeQrModal(); }

  document.getElementById('btn-back').addEventListener('click', function(){
    if(isWeChatBrowser()){
      window.location.href = WECHAT_URL;
    } else {
      openQrModal();
    }
  });
  document.getElementById('qr-close').addEventListener('click', closeQrModal);
  qrOverlay.addEventListener('click', function(e){
    if(e.target === qrOverlay) closeQrModal();
  });

  document.getElementById('lang-switch').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-lang]');
    if(!btn) return;
    var newLang = btn.getAttribute('data-lang');
    if(newLang === LANG) return;
    LANG = newLang;
    applyStaticI18n();
    renderQuestion();
    if(state.resultComputed && elResult.classList.contains('active')){
      computeAndShowResult();
    }
  });

  // 初始化
  applyStaticI18n();
  renderQuestion();
})();
</script>
